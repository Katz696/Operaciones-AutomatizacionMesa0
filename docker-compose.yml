version: "3.9"

services:

  db:
    image: postgres:15
    container_name: postgres-ml
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: api-ml
    depends_on:
      - db
    environment:
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      DATABASE_URL: ${DATABASE_URL}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD}
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  api-proactivanet:
    build:
      context: ./proactivanetRPA
      dockerfile: Dockerfile
    container_name: api-proactivanet
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PROACTIVA_USER: ${PROACTIVA_USER}
      PROACTIVA_PASSWORD: ${PROACTIVA_PASSWORD}
      BASE_URL: ${BASE_URL}
      LOGIN_URL: ${LOGIN_URL}
    ports:
      - "8001:8001"
    volumes:
      - ./proactivanet/app:/app/app
      - screenshots_data:/app/screenshots
    shm_size: "1gb"

  n8n:
    image: n8nio/n8n
    container_name: n8n-ml
    restart: always
    ports:
      - "5678:5678"
    environment:
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE}
      DB_TYPE: ${DB_TYPE}
      DB_POSTGRESDB_HOST: ${DB_POSTGRESDB_HOST}
      DB_POSTGRESDB_PORT: ${DB_POSTGRESDB_PORT}
      DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE}
      DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER}
      DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD}
      USERNAME: ${N8N_USERNAME}
      PASSWORD: ${N8N_PASSWORD}
      API_GC: ${API_GC}
      API: ${API}
      API_PROACTIVANET: ${API_PROACTIVANET}
      URL: ${URL}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
    depends_on:
      - db
      - api-proactivanet
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
  screenshots_data: